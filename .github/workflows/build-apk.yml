name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.5 --distribution-type bin

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: AIBOBSCSTEWA-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30